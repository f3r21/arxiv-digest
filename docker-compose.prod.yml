# Stack de produccion. Diferencias vs docker-compose.yml:
#  - SIN mailhog (emails salen por Resend, replies por Mailsac)
#  - Caddy expone 80+443 publicos (LE auto-emite cert real)
#  - Imagenes pre-built en Docker Hub (no build en la VM)
#  - Memory limits estrictos: total <= 500 MB, cabe en VM de 1 GB RAM
#  - .env.prod en lugar de .env
#
# Uso (en la VM, despues de configurar .env.prod):
#   ./tools/deploy.sh
#
# Para actualizar codigo: rebuild + push desde la laptop con
#   ./tools/build_and_push.sh
# luego en la VM: ./tools/deploy.sh
services:
  subscriptions:
    image: ${DOCKERHUB_USER}/arxiv-digest-subscriptions:latest
    container_name: arxiv-subscriptions
    restart: always
    env_file:
      - .env.prod
    volumes:
      - ./data:/app/data
    networks: [internal]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=2).status == 200 else 1)"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 150M
        reservations:
          memory: 80M
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "5"}

  caddy:
    image: caddy:2-alpine
    container_name: arxiv-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env.prod
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      subscriptions:
        condition: service_healthy
    networks: [internal]
    deploy:
      resources:
        limits:
          memory: 50M
        reservations:
          memory: 20M
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "5"}

  digest:
    image: ${DOCKERHUB_USER}/arxiv-digest-digest:latest
    container_name: arxiv-digest
    restart: always
    depends_on:
      subscriptions:
        condition: service_healthy
      translator:
        condition: service_healthy
    env_file:
      - .env.prod
    volumes:
      - ./filters.yml:/app/filters.yml:ro
      - ./data:/app/data
    networks: [internal]
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/alive"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 100M
        reservations:
          memory: 50M
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "5"}

  listener:
    image: ${DOCKERHUB_USER}/arxiv-digest-listener:latest
    container_name: arxiv-listener
    restart: always
    depends_on:
      subscriptions:
        condition: service_healthy
    env_file:
      - .env.prod
    volumes:
      - ./data:/app/data
      - ./pdfs:/app/pdfs
    networks: [internal]
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/alive"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 80M
        reservations:
          memory: 40M
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "5"}

  translator:
    image: ${DOCKERHUB_USER}/arxiv-digest-translator:latest
    container_name: arxiv-translator
    restart: always
    environment:
      MYMEMORY_EMAIL: "${MYMEMORY_EMAIL:-}"
      TZ: "${TZ:-UTC}"
    networks: [internal]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=2).status == 200 else 1)"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 120M
        reservations:
          memory: 60M
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "5"}

networks:
  internal:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
