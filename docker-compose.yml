# Toda la configuracion (SMTP, inbox, categorias, scheduler) vive en `.env`.
# Copia `.env.example` a `.env` antes de levantar el stack.
services:
  digest:
    build: ./digest
    container_name: arxiv-digest
    restart: unless-stopped
    depends_on:
      - mailhog
      - translator
    env_file:
      - .env
    volumes:
      - ./filters.yml:/app/filters.yml:ro
      - ./data:/app/data
    networks: [internal]
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "3"}

  listener:
    build: ./listener
    container_name: arxiv-listener
    restart: unless-stopped
    depends_on:
      - mailhog
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./pdfs:/app/pdfs
    networks: [internal]
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "3"}

  translator:
    build: ./translator
    container_name: arxiv-translator
    restart: unless-stopped
    environment:
      MYMEMORY_EMAIL: ""
      TZ: America/Lima
    networks: [internal]
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "3"}

  mailhog:
    image: mailhog/mailhog:latest
    container_name: arxiv-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks: [internal]

networks:
  internal:
    driver: bridge
