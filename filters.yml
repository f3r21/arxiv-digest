# Categorias de arxiv a consultar. Catalogo: https://arxiv.org/category_taxonomy
# Acepta lista (`categories`) o string (`category`). Si ambos estan, gana
# `categories`. La env ARXIV_CATEGORIES (CSV) sobrescribe lo de aqui.
categories:
  - cs.DC

# Maximo papers en el digest (cap aplicado tras filtrar).
max_papers: 15

# Para que un paper aparezca debe matchear al menos un keyword O un autor.
keywords:
  - kubernetes
  - autoscaling
  - cold start
  - cold-start
  - serverless
  - microservice
  - container

authors:
  - "Pavlou T"
  - "Liu Y"
